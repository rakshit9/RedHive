# RedHive local stack.
#
#   juiceshop -> the intentionally-vulnerable practice TARGET we scan
#   db        -> Postgres for scans + findings (schema auto-loaded on first boot)
#
# Bring it up with:  docker compose up -d
services:
  juiceshop:
    image: bkimminich/juice-shop
    container_name: redhive-juiceshop
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: redhive-db
    environment:
      POSTGRES_USER: redhive
      POSTGRES_PASSWORD: redhive
      POSTGRES_DB: redhive
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # schema.sql in /docker-entrypoint-initdb.d/ runs automatically the
      # first time the data volume is created (i.e. on a fresh db).
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    restart: unless-stopped

  # --- API service (uncomment when the FastAPI app is ready) ---
  # api:
  #   build: .
  #   container_name: redhive-api
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     # talk to the db service over the compose network, not localhost
  #     DATABASE_URL: postgresql://redhive:redhive@db:5432/redhive
  #   depends_on:
  #     - db
  #   restart: unless-stopped

volumes:
  postgres-data:
