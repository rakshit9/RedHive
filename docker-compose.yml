# RedHive local stack.
#
#   juiceshop -> the intentionally-vulnerable practice TARGET we scan
#   db        -> Postgres (schema managed by Alembic migrations, not initdb)
#   api       -> FastAPI web layer (auth, scans, SSE)
#   worker    -> background scan executor (pulls queued scans from Postgres)
#
# Bring it up with:  docker compose up -d --build
# Migrations run automatically via the api service entrypoint.
services:
  juiceshop:
    image: bkimminich/juice-shop
    container_name: redhive-juiceshop
    ports:
      - "3001:3000"
    restart: unless-stopped

  # Bundled intentionally-vulnerable demo target (rich attack surface).
  demo-target:
    build: .
    container_name: redhive-demo-target
    command: ["uvicorn", "demo_target.app:app", "--host", "0.0.0.0", "--port", "8780"]
    ports:
      - "8780:8780"
    restart: unless-stopped

  db:
    image: postgres:16
    container_name: redhive-db
    environment:
      POSTGRES_USER: redhive
      POSTGRES_PASSWORD: redhive
      POSTGRES_DB: redhive
    ports:
      # Published on 5433 to avoid colliding with a host-installed Postgres on
      # 5432. Inside the compose network services still reach it on db:5432.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redhive"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: .
    container_name: redhive-api
    command: ["./scripts/start-api.sh"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://redhive:redhive@db:5432/redhive
      SCAN_ALLOWLIST: localhost,127.0.0.1,juiceshop,demo-target,host.docker.internal
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: .
    container_name: redhive-worker
    command: ["python", "-m", "redhive.worker"]
    environment:
      DATABASE_URL: postgresql://redhive:redhive@db:5432/redhive
      SCAN_ALLOWLIST: localhost,127.0.0.1,juiceshop,demo-target,host.docker.internal
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
