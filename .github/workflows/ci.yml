name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: redhive
          POSTGRES_PASSWORD: redhive
          POSTGRES_DB: redhive_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U redhive"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://redhive:redhive@localhost:5432/redhive_test
      SECRET_KEY: ci-secret-key-deterministic-0000000000
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ci-not-used

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest
